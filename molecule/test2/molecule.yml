---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
  yamllint -c molecule/yaml-lint.yml .
  ansible-lint -c molecule/ansible-lint.yml .
platforms:
  - name: instance
    image: "geerlingguy/docker-debian12-ansible:latest"
    #image: "alekcander/docker-centos7-ansible:latest"
    #image: "almalinux:9.4"
    #command: ""
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    #override_command: false
    #tmpfs:
    #  - /run
    #  - /tmp
    volumes:
      #- "/var/run/docker.sock:/tmp/docker.sock"
      #- "/var/run/docker.sock:/var/run/docker.sock"
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    #  - ${MOLECULE_PROJECT_DIRECTORY}/molecule/default/resources/CI_CD_Database.kdbx:/root/CI_CD_Database.kdbx
    #  - /sys/fs/cgroup:/sys/fs/cgroup:rw
    #env:
      #DOCKER_HOST: "tcp://dind:2375"
      #DOCKER_HOST: "unix:///var/run/docker.sock"
      #DOCKER_HOST: "unix://127.0.0.1:2375"
provisioner:
  name: ansible
  #log: true
scenario:
  name: test2
  test_sequence:
    - create
    - prepare
    #- converge
    #- verify
    - destroy
verifier:
  name: ansible
